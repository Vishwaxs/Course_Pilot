
# What to change:
#   1. Replace 'changeme' password with a secure one.
#   2. Ensure it matches NEO4J_PASSWORD in .env.
#
# Run: docker-compose up -d
# Browse: http://localhost:7474

# TODO[USER_ACTION]: REPLACE_NEO4J_PASSWORD — set a secure password below.

version: "3.9"

services:
  neo4j:
    image: neo4j:5-community
    container_name: ckg_jtt_neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt protocol
    environment:
      - NEO4J_AUTH=neo4j/changeme   # TODO[USER_ACTION]: REPLACE 'changeme' with your password
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./data/neo4j_import:/var/lib/neo4j/import
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "changeme", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  neo4j_data:
  neo4j_logs:
